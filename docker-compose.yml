services:
  postgres:
    image: postgres:16
    container_name: skylinx-peopleos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skylinx_peopleos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: skylinx-peopleos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
